services:
  - type: web
    name: meddash-api
    runtime: python
    plan: free
    buildCommand: |
      pip install -r requirements.txt
      cd api && python init_db.py
    startCommand: cd api && gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 60
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DASHSCOPE_API_KEY
        sync: false
      - key: DATABASE_PATH
        value: /opt/render/project/src/hospital.db
      - key: ALLOWED_ORIGINS
        value: "*"
    disk:
      name: meddash-data
      mountPath: /opt/render/project/src
      sizeGB: 1
