services:
  - type: web
    name: meddash-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn api.app:app --bind 0.0.0.0:$PORT --workers 2
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DASHSCOPE_API_KEY
        sync: false
      - key: DATABASE_PATH
        value: hospital.db
    disk:
      name: meddash-data
      mountPath: /opt/render/project/src
      sizeGB: 1
